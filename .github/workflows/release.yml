name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# `id-token: write` lets the publish step mint a short-lived OIDC token so
# npm can attach a provenance attestation (linking each published tarball to
# this repo + workflow run). Auth still uses NPM_TOKEN below — provenance and
# registry auth are independent; the OIDC token signs the attestation, the
# npm token authenticates the upload. `contents`/`pull-requests: write` remain
# for the changesets action to open the Version Packages PR and cut releases.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when there are pending
      # changesets. Once that PR is merged (with no changesets left), this
      # step publishes to npm instead by running the root `release` script
      # (`pnpm build && changeset publish`).
      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
